experiment:
  input_manifest: ../../examples/single_case/sample.json
  output_root: ../../runs/source_anchor_demo_cache

method:
  config: ../methods/source_anchor.example.yaml

models:
  config: ../models/local_models.example.yaml

roi:
  source: cache
  cache_root: ../../runs/source_anchor_demo/roi_cache
  save_cache: false
  threshold: 0.5
  num_maps_per_mask: 1
  mask_encode_strength: 0.5
  mask_thresholding_ratio: 3.0

inversion:
  source: cache
  cache_root: ../../runs/source_anchor_demo/inversion_cache
  save_cache: false

runtime:
  device: cuda
  dtype: float16
  batch_size: 1
  local_files_only: true
  attention_slicing: true
  vae_slicing: true
  channels_last: true
  enable_tf32: true
  enable_cpu_offload: false
  enable_xformers: false

metrics:
  enable_metrics: false
  enable_lpips: true
  enable_psnr: true
  enable_mse: true
  enable_ssim: true
  enable_clip_score: true
  enable_structure_distance: false
  enable_locality_ratio: true
  lpips_net: squeeze
  clip_model_id: openai/clip-vit-large-patch14
  clip_local_files_only: true
  dino_model_name: dino_vits8
  dino_global_patch_size: 224
  dino_repo_or_dir: null
  dino_cache_dir: ../../.cache/torch/hub
  dino_weights_path: null
  dino_local_files_only: true

save:
  roi_cache: false
  inversion_tensors: false
  debug_json: true
  step_visualizations: false
  step_interval: 1
  step_indices: []
  step_include_last: true
  step_save_trace: true
  step_save_diagnostics: true
  step_save_dynamic_mask: true
  step_save_effective_mask: true
  step_save_anchor_mask: true
  step_save_attention: true
  step_save_discrepancy: true
  step_save_latent_drift: true
  step_save_roi: false
  step_save_latent_preview: false
  overview: true
